<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nachbarschaftslärm – Stimmen von Betroffenen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth transitions for the quote text */
        .quote-transition {
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
        }
        .quote-hidden {
            opacity: 0;
            transform: translateY(10px);
        }
        .quote-visible {
            opacity: 1;
            transform: translateY(0);
        }
        /* Custom range slider styling */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #1e3a8a;
            cursor: pointer;
        }
        input[type=range]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #1e3a8a;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-blue-900 text-white shadow-md">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
            <h1 class="text-xl sm:text-2xl font-bold text-center sm:text-left tracking-tight" id="ui-title">
                Nachbarschaftslärm – Stimmen von Betroffenen
            </h1>
            
            <!-- Language Toggle -->
            <div class="flex bg-blue-800 rounded-lg p-1 shadow-inner">
                <button onclick="setLang('de')" id="btn-lang-de" class="px-4 py-1.5 text-sm font-medium rounded-md bg-white text-blue-900 shadow transition-colors">DE</button>
                <button onclick="setLang('en')" id="btn-lang-en" class="px-4 py-1.5 text-sm font-medium rounded-md text-blue-100 hover:text-white transition-colors">EN</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-5xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 space-y-8">
        
        <!-- Context Alert -->
        <div class="bg-blue-50 border-l-4 border-blue-600 p-5 rounded-r-lg shadow-sm">
            <div class="flex items-start">
                <div class="flex-shrink-0">
                    <svg class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div class="ml-3">
                    <p class="text-sm text-blue-900 leading-relaxed" id="ui-context"></p>
                </div>
            </div>
        </div>

        <!-- Controls / Filters -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col sm:flex-row gap-4">
            <!-- Search -->
            <div class="relative flex-grow">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" id="search" class="block w-full pl-10 pr-3 py-2 border border-slate-200 rounded-lg leading-5 bg-slate-50 placeholder-slate-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors sm:text-sm" placeholder="Suchen...">
            </div>
            
            <!-- Category -->
            <div class="sm:w-64 flex-shrink-0">
                <select id="category" class="block w-full pl-3 pr-10 py-2 border border-slate-200 rounded-lg leading-5 bg-slate-50 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors sm:text-sm appearance-none">
                    <option value="all" id="cat-all">Alle Kategorien</option>
                    <option value="general" id="cat-general">Allgemeine Erfahrungen</option>
                    <option value="policy" id="cat-policy">Politikversagen</option>
                    <option value="before" id="cat-before">Vorher / Nachher</option>
                </select>
            </div>
        </div>

        <!-- Quote Display Area -->
        <div class="relative bg-white rounded-2xl shadow-lg border border-slate-100 overflow-hidden min-h-[300px] flex flex-col justify-center" id="quote-container" onmouseenter="pauseOnHover()" onmouseleave="resumeOnHover()">
            
            <!-- Background Decoration -->
            <div class="absolute top-4 left-6 text-slate-100 select-none z-0">
                <svg class="h-32 w-32" fill="currentColor" viewBox="0 0 32 32">
                    <path d="M10 8c-3.3 0-6 2.7-6 6v10h10V14H8c0-2.2 1.8-4 4-4V8zm14 0c-3.3 0-6 2.7-6 6v10h10V14h-6c0-2.2 1.8-4 4-4V8z" />
                </svg>
            </div>

            <div class="relative z-10 px-8 py-12 flex-grow flex flex-col justify-center items-center text-center">
                <!-- Category Pill -->
                <span id="quote-category" class="inline-block px-3 py-1 bg-blue-100 text-blue-800 text-xs font-semibold rounded-full uppercase tracking-wide mb-6"></span>
                
                <!-- Quote Text -->
                <blockquote id="quote-text" class="text-xl sm:text-2xl md:text-3xl font-medium text-slate-800 leading-snug quote-transition quote-hidden max-w-4xl">
                    Lade Zitate...
                </blockquote>
                
                <!-- Match Counter -->
                <div id="quote-counter" class="mt-8 text-sm text-slate-400 font-medium tracking-wider"></div>
            </div>
        </div>

        <!-- Playback Controls -->
        <div class="flex flex-col sm:flex-row items-center justify-between bg-white p-4 rounded-xl shadow-sm border border-slate-100 gap-6">
            
            <!-- Navigation Buttons -->
            <div class="flex items-center space-x-4">
                <button onclick="prevQuote()" class="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-colors focus:outline-none" title="Zurück">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                </button>
                
                <button onclick="togglePlay()" id="btn-play-pause" class="flex items-center justify-center h-12 w-12 bg-blue-600 text-white rounded-full hover:bg-blue-700 shadow-md transition-transform transform hover:scale-105 focus:outline-none">
                    <!-- Pause Icon (Default) -->
                    <svg id="icon-pause" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg>
                    <!-- Play Icon (Hidden) -->
                    <svg id="icon-play" class="h-5 w-5 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
                
                <button onclick="nextQuote()" class="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-colors focus:outline-none" title="Weiter">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                </button>
            </div>

            <!-- Speed Control -->
            <div class="flex items-center space-x-4 w-full sm:w-auto">
                <span id="ui-speed-label" class="text-sm font-medium text-slate-500 whitespace-nowrap">Dauer:</span>
                <input type="range" id="speed" min="3000" max="15000" step="1000" value="10000" class="w-full sm:w-32 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                <span id="speed-display" class="text-sm text-slate-500 font-mono w-8 text-right">10s</span>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="mt-auto py-6 text-center text-sm text-slate-400 bg-white border-t border-slate-200">
        <p id="ui-footer">Nachbarschaftslärm Projekt &copy; 2024</p>
    </footer>

    <script>
        // --- State Management ---
        const state = {
            data: [],
            filtered: [],
            index: 0,
            lang: "de",
            timer: null,
            isPlaying: true,
            speed: 10000,
            isHovering: false,
            wasPlayingBeforeHover: true
        };

        const sources = [
            { url: "https://raw.githubusercontent.com/nachbarschaftslaerm/victim_testimonials/main/data/general_testimonials.csv", cat: "general" },
            { url: "https://raw.githubusercontent.com/nachbarschaftslaerm/victim_testimonials/main/data/policy_failure.csv", cat: "policy" },
            { url: "https://raw.githubusercontent.com/nachbarschaftslaerm/victim_testimonials/main/data/before_after.csv", cat: "before" }
        ];

        // --- Internationalization (i18n) ---
        const i18n = {
            de: {
                title: "Nachbarschaftslärm – Stimmen von Betroffenen",
                context: "Diese Zitate wurden über viele Jahre im Rahmen des Projekts Nachbarschaftslärm informell gesammelt. Jedes Zitat spiegelt die persönlichen Erfahrungen einzelner Betroffener wider. Einige Aussagen wurden zur Klarheit oder Kürze leicht paraphrasiert. Alle Zitate werden anonym präsentiert, um Betroffene vor weiterer Belästigung oder Konflikten zu schützen.",
                searchPlaceholder: "Suchen...",
                cats: {
                    all: "Alle Kategorien",
                    general: "Allgemeine Erfahrungen",
                    policy: "Politikversagen",
                    before: "Vorher / Nachher"
                },
                speedLabel: "Dauer:",
                footer: "Nachbarschaftslärm Projekt",
                noResults: "Keine Zitate entsprechen den Filtern.",
                loading: "Lade Zitate..."
            },
            en: {
                title: "Neighborhood Noise – Voices of Victims",
                context: "These quotes have been informally collected over many years through the Nachbarschaftslärm project. Each quote reflects the personal experiences of individual victims. Some statements have been paraphrased slightly for clarity or brevity. All quotes are presented anonymously in order to protect victims from further harassment or conflict.",
                searchPlaceholder: "Search...",
                cats: {
                    all: "All Categories",
                    general: "General Experiences",
                    policy: "Policy Failure",
                    before: "Before / After"
                },
                speedLabel: "Duration:",
                footer: "Neighborhood Noise Project",
                noResults: "No quotes match the current filters.",
                loading: "Loading quotes..."
            }
        };

        // --- Core Logic ---
        
        // Robust CSV Parser
        function parseCSV(text, cat) {
            let lines = text.trim().split("\n").slice(1);
            lines.forEach(l => {
                // Remove outer quotes and split by inner separator
                let cleaned = l.replace(/^"/, '').replace(/"$/, '');
                let parts = cleaned.split('","');
                if (parts.length >= 2) {
                    state.data.push({ en: parts[0], de: parts[1], cat });
                }
            });
        }

        async function init() {
            updateStaticUI();
            try {
                for (const s of sources) {
                    let r = await fetch(s.url);
                    let t = await r.text();
                    parseCSV(t, s.cat);
                }
                applyFilter();
                if (state.isPlaying) resetTimer();
            } catch (error) {
                document.getElementById("quote-text").innerText = "Fehler beim Laden der Daten / Error loading data.";
                document.getElementById("quote-text").classList.replace('quote-hidden', 'quote-visible');
            }
        }

        function applyFilter() {
            let cat = document.getElementById("category").value;
            let q = document.getElementById("search").value.toLowerCase();
            
            state.filtered = state.data.filter(d => {
                let text = (state.lang === "de" ? d.de : d.en).toLowerCase();
                let matchCat = (cat === "all" || d.cat === cat);
                let matchSearch = (q === "" || text.includes(q));
                return matchCat && matchSearch;
            });
            
            state.index = 0;
            showQuote();
            if(state.isPlaying) resetTimer();
        }

        function showQuote() {
            const quoteEl = document.getElementById("quote-text");
            const catEl = document.getElementById("quote-category");
            const countEl = document.getElementById("quote-counter");

            // Animation out
            quoteEl.classList.remove('quote-visible');
            quoteEl.classList.add('quote-hidden');

            setTimeout(() => {
                if (state.filtered.length === 0) {
                    quoteEl.innerText = i18n[state.lang].noResults;
                    catEl.innerText = "";
                    countEl.innerText = "0 / 0";
                } else {
                    let q = state.filtered[state.index];
                    quoteEl.innerText = state.lang === "de" ? q.de : q.en;
                    catEl.innerText = i18n[state.lang].cats[q.cat];
                    countEl.innerText = `${state.index + 1} / ${state.filtered.length}`;
                }

                // Animation in
                quoteEl.classList.remove('quote-hidden');
                quoteEl.classList.add('quote-visible');
            }, 400); // Wait for fade out
        }

        // --- Navigation & Playback ---

        function nextQuote() {
            if (state.filtered.length <= 1) return;
            state.index = (state.index + 1) % state.filtered.length;
            showQuote();
            if (state.isPlaying) resetTimer();
        }

        function prevQuote() {
            if (state.filtered.length <= 1) return;
            state.index = (state.index - 1 + state.filtered.length) % state.filtered.length;
            showQuote();
            if (state.isPlaying) resetTimer();
        }

        function resetTimer() {
            clearInterval(state.timer);
            if (state.isPlaying && !state.isHovering) {
                state.timer = setInterval(nextQuote, state.speed);
            }
        }

        function togglePlay() {
            state.isPlaying = !state.isPlaying;
            updatePlayPauseUI();
            
            if (state.isPlaying) {
                nextQuote(); // Instantly move and start
            } else {
                clearInterval(state.timer);
            }
        }

        function pauseOnHover() {
            state.isHovering = true;
            state.wasPlayingBeforeHover = state.isPlaying;
            clearInterval(state.timer);
        }

        function resumeOnHover() {
            state.isHovering = false;
            if (state.wasPlayingBeforeHover) {
                state.isPlaying = true;
                resetTimer();
            }
        }

        // --- UI Updaters ---

        function updatePlayPauseUI() {
            document.getElementById('icon-pause').classList.toggle('hidden', !state.isPlaying);
            document.getElementById('icon-play').classList.toggle('hidden', state.isPlaying);
        }

        function updateStaticUI() {
            const t = i18n[state.lang];
            
            // Text Elements
            document.title = t.title;
            document.getElementById("ui-title").innerText = t.title;
            document.getElementById("ui-context").innerText = t.context;
            document.getElementById("search").placeholder = t.searchPlaceholder;
            document.getElementById("ui-speed-label").innerText = t.speedLabel;
            document.getElementById("ui-footer").innerHTML = `${t.footer} &copy; ${new Date().getFullYear()}`;
            
            // Categories
            document.getElementById("cat-all").innerText = t.cats.all;
            document.getElementById("cat-general").innerText = t.cats.general;
            document.getElementById("cat-policy").innerText = t.cats.policy;
            document.getElementById("cat-before").innerText = t.cats.before;

            // Language Toggle Styling
            const btnDe = document.getElementById("btn-lang-de");
            const btnEn = document.getElementById("btn-lang-en");
            
            if (state.lang === 'de') {
                btnDe.className = "px-4 py-1.5 text-sm font-medium rounded-md bg-white text-blue-900 shadow transition-colors";
                btnEn.className = "px-4 py-1.5 text-sm font-medium rounded-md text-blue-100 hover:text-white transition-colors";
            } else {
                btnEn.className = "px-4 py-1.5 text-sm font-medium rounded-md bg-white text-blue-900 shadow transition-colors";
                btnDe.className = "px-4 py-1.5 text-sm font-medium rounded-md text-blue-100 hover:text-white transition-colors";
            }
        }

        function setLang(newLang) {
            if (state.lang === newLang) return;
            state.lang = newLang;
            updateStaticUI();
            applyFilter(); // Re-render current quote in new language
        }

        // --- Event Listeners ---

        document.getElementById("category").addEventListener("change", applyFilter);
        document.getElementById("search").addEventListener("input", applyFilter);
        
        document.getElementById("speed").addEventListener("input", (e) => {
            state.speed = parseInt(e.target.value);
            document.getElementById("speed-display").innerText = (state.speed / 1000) + "s";
            if (state.isPlaying) resetTimer();
        });

        // Start Application
        init();

    </script>
</body>
</html>
